<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grid Pricing Section</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Pricing Plans</h1>
    <p>Choose the plan that best suits your needs</p>
  </header>

  <main>
    <section class="card">
      <h2>Basic</h2>
      <h3>$9/mo</h3>
      <p>Perfect for beginners starting their journey.</p>
      <button>Select Plan</button>
    </section>

    <section class="card">
      <h2>Pro</h2>
      <h3>$19/mo</h3>
      <p>For developers who need more features and flexibility.</p>
      <button>Select Plan</button>
    </section>

    <section class="card">
      <h2>Premium</h2>
      <h3>$29/mo</h3>
      <p>Best choice for professionals and growing teams.</p>
      <button>Select Plan</button>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Pricing Section Demo</p>
  </footer>

</body>
</html>
